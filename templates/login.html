<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinit Dashboard — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <img src="https://media.licdn.com/dms/image/v2/D4D0BAQE14hGHj2-CRQ/company-logo_200_200/B4DZZogyDcGwAI-/0/1745510146620/infinitbanking_logo?e=2147483647&v=beta&t=97jKPt5GZ4My-DiMkelKJobr941lx72RHGcbTSCdBdI"
                 alt="Infinit Banking" class="h-16 w-16 rounded-xl mb-4 object-contain">
            <h1 class="text-2xl font-bold text-gray-900">Infinit Dashboard</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autofocus
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="Enter your password"
                >
            </div>
            <button
                type="submit"
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg px-4 py-3 transition"
            >
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
